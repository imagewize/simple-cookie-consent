name: Plugin Check

on: pull_request

jobs:
  plugin-check:
    name: WP Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build clean plugin directory
        run: |
          mkdir -p /tmp/warder-cookie-consent
          rsync -a --exclude='.git' --exclude-from='.distignore' . /tmp/warder-cookie-consent/

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: '/tmp/warder-cookie-consent'
          checks: ''
          exclude-checks: 'EnqueuedScriptsScope'
